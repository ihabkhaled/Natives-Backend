name: Gate - OpenAPI Contract

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gate-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: canonical contract drift
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Verify Canonical OpenAPI Artifact
        env:
          NODE_ENV: test
          JWT_SECRET: ci-synthetic-contract-generation-value-0123456789abcdefghij
        run: npm run contract:check

      - name: Read Base Contract
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p .tmp
          git show "origin/${{ github.base_ref }}:contracts/openapi.json" > .tmp/openapi-base.json

      - name: Reject Unapproved Breaking Drift
        if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'api-breaking-approved')
        run: npm run contract:compatibility

      - name: Record Approved Breaking Drift
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'api-breaking-approved')
        run: npm run contract:compatibility -- --allow-breaking
