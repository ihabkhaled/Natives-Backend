name: Gate - E2E

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gate-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: test:e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: natives_test
          POSTGRES_PASSWORD: natives_test
          POSTGRES_DB: natives_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U natives_test -d natives_test"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Backend E2E Gate
        run: npm run test:e2e
