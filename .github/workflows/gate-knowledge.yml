name: Gate - Knowledge

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gate-knowledge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  knowledge:
    name: knowledge
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Knowledge Staleness Gate
        run: npm run knowledge:check
