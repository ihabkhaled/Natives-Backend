# Disposable PostgreSQL for integration tests. Runs on a non-default loopback
# port so it never collides with a local dev database, uses a `_test` database
# name (enforced by the test-database safeguard), and keeps data in tmpfs so the
# container is fast and fully disposable.
services:
  postgres-test:
    image: postgres:16
    container_name: natives-postgres-test
    environment:
      POSTGRES_USER: natives_test
      POSTGRES_PASSWORD: natives_test
      POSTGRES_DB: natives_test
    ports:
      - '127.0.0.1:55432:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U natives_test -d natives_test']
      interval: 3s
      timeout: 3s
      retries: 20
